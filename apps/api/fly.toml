# Fly.io configuration for SecureAssess API
app = "secureassess-api"
primary_region = "sin"   # Singapore — closest to Pakistan (PKT)
                         # Other options: dxb (Dubai), bom (Mumbai)

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  ENVIRONMENT = "production"
  LOG_LEVEL = "INFO"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false    # never sleep — important for assessment continuity
  auto_start_machines = true
  min_machines_running = 1      # always at least 1 machine running

  [http_service.concurrency]
    type = "requests"
    hard_limit = 50
    soft_limit = 30

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[checks]
  [checks.health]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/health"
    port = 8080
    timeout = "5s"
    type = "http"
