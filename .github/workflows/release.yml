name: Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.github/workflows/ci.yml'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

# Prevent concurrent releases
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # ─── JOB 1: Determine version, create tag ───────────────────────
  version:
    name: Version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      new_tag:     ${{ steps.bump.outputs.new_tag }}
      skip:        ${{ steps.bump.outputs.skip }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version bump
        id: bump
        run: |
          CURRENT=$(cat VERSION)
          echo "Current version: $CURRENT"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BUMP_TYPE="${{ github.event.inputs.bump }}"
          else
            LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            if [ -z "$LAST_TAG" ]; then
              COMMITS=$(git log --format="%s" HEAD)
            else
              COMMITS=$(git log --format="%s" "$LAST_TAG"..HEAD)
            fi
            echo "Commits since last tag:"
            echo "$COMMITS"

            if echo "$COMMITS" | grep -qE "^(feat|fix|refactor|perf)!:|BREAKING CHANGE:"; then
              BUMP_TYPE="major"
            elif echo "$COMMITS" | grep -qE "^feat(\(.+\))?:"; then
              BUMP_TYPE="minor"
            else
              BUMP_TYPE="patch"
            fi
          fi

          echo "Bump type: $BUMP_TYPE"
          case "$BUMP_TYPE" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          NEW_TAG="v$NEW_VERSION"
          echo "New version: $NEW_VERSION"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "new_tag=$NEW_TAG"         >> $GITHUB_OUTPUT
          echo "skip=false"               >> $GITHUB_OUTPUT

      - name: Update VERSION and tauri.conf.json
        if: steps.bump.outputs.skip == 'false'
        run: |
          NEW_VERSION="${{ steps.bump.outputs.new_version }}"
          echo "$NEW_VERSION" > VERSION

          if [ -f apps/desktop/src-tauri/tauri.conf.json ]; then
            python3 -c "
          import json
          with open('apps/desktop/src-tauri/tauri.conf.json', 'r') as f:
              data = json.load(f)
          data['version'] = '$NEW_VERSION'
          with open('apps/desktop/src-tauri/tauri.conf.json', 'w') as f:
              json.dump(data, f, indent=2)
          print('Updated tauri.conf.json to $NEW_VERSION')
          "
          fi

          if [ -f apps/desktop/src-tauri/Cargo.toml ]; then
            sed -i "s/^version = \".*\"/version = \"$NEW_VERSION\"/" \
              apps/desktop/src-tauri/Cargo.toml
          fi

      - name: Commit version bump
        if: steps.bump.outputs.skip == 'false' && github.ref_name == 'main'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION apps/desktop/src-tauri/tauri.conf.json apps/desktop/src-tauri/Cargo.toml
          git commit -m "chore(release): bump version to ${{ steps.bump.outputs.new_version }} [skip ci]"
          git push origin HEAD

      - name: Create and push tag
        if: steps.bump.outputs.skip == 'false' && github.ref_name == 'main'
        run: |
          NEW_TAG="${{ steps.bump.outputs.new_tag }}"
          if git rev-parse "$NEW_TAG" >/dev/null 2>&1; then
            echo "Tag $NEW_TAG already exists — skipping"
          else
            git tag "$NEW_TAG"
            git push origin "$NEW_TAG"
          fi

  # ─── JOB 2: Build all platforms (parallel) ──────────────────────
  build:
    name: Build — ${{ matrix.label }}
    needs: version
    if: needs.version.outputs.skip != 'true'
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform:     macos-latest
            target:       universal-apple-darwin
            label:        macOS Universal
            artifact:     mac-universal
            bundles:      dmg,app
            rust_targets: aarch64-apple-darwin x86_64-apple-darwin

          - platform:     ubuntu-22.04
            target:       x86_64-unknown-linux-gnu
            label:        Linux x86_64
            artifact:     linux-x86_64
            bundles:      appimage,deb
            rust_targets: x86_64-unknown-linux-gnu

          - platform:     ubuntu-24.04-arm
            target:       aarch64-unknown-linux-gnu
            label:        Linux ARM64
            artifact:     linux-arm64
            bundles:      appimage,deb
            rust_targets: aarch64-unknown-linux-gnu

          - platform:     windows-latest
            target:       x86_64-pc-windows-msvc
            label:        Windows x64
            artifact:     windows-x64
            bundles:      msi,nsis
            rust_targets: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout (post-version-bump)
        uses: actions/checkout@v4
        with:
          ref: main    # always pull the freshest main, which includes the version commit

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target
          key: ${{ matrix.target }}

      # ── Linux x86_64 system deps ────────────────────────────────
      - name: Install Linux x86_64 deps
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libwebkit2gtk-4.1-dev libssl-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf libgtk-3-dev libglib2.0-dev libsoup-3.0-dev

      # ── Linux ARM64 system deps (native runner) ─────────────────
      - name: Install Linux ARM64 deps
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libwebkit2gtk-4.1-dev libssl-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf libgtk-3-dev libglib2.0-dev libsoup-3.0-dev

      # ── macOS: both targets for universal binary ─────────────────
      - name: Add macOS universal targets
        if: matrix.platform == 'macos-latest'
        run: |
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin

      # ── Build ────────────────────────────────────────────────────
      - name: Build Tauri app
        env:
          # Frontend env vars embedded into the JS bundle at build time
          VITE_API_BASE_URL:        ${{ secrets.VITE_API_BASE_URL }}
          VITE_SUPABASE_URL:        ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY:   ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_JUDGE0_URL:          ${{ secrets.VITE_JUDGE0_URL }}
          VITE_EXECUTION_BACKEND:   ${{ secrets.VITE_EXECUTION_BACKEND }}
          # macOS code signing (skipped when secrets are absent)
          APPLE_CERTIFICATE:              ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD:     ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY:         ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID:                       ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD:                 ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID:                  ${{ secrets.APPLE_TEAM_ID }}
          # Tauri updater signing
          TAURI_SIGNING_PRIVATE_KEY:          ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        shell: bash
        run: |
          cd apps/desktop

          # Skip macOS signing when no certificate is configured
          if [ "${{ matrix.platform }}" = "macos-latest" ] && [ -z "$APPLE_CERTIFICATE" ]; then
            unset APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY
            unset APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID
          fi

          pnpm tauri build \
            --target   ${{ matrix.target }} \
            --bundles  ${{ matrix.bundles }} \
            --config   src-tauri/tauri.conf.prod.json

      # ── Collect artifacts ─────────────────────────────────────────
      - name: Collect artifacts
        id: collect
        shell: bash
        run: |
          TARGET="${{ matrix.target }}"
          BUNDLE_DIR="apps/desktop/src-tauri/target/$TARGET/release/bundle"
          OUT="dist/release/${{ matrix.artifact }}"
          mkdir -p "$OUT"

          find "$BUNDLE_DIR" \( \
            -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" \
            -o -name "*.msi" -o -name "*.exe" \
          \) -exec cp {} "$OUT/" \;

          echo "Artifacts collected:"
          ls -lh "$OUT/"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/release/${{ matrix.artifact }}/
          if-no-files-found: error
          retention-days: 30

  # ─── JOB 3: Create GitHub Release ───────────────────────────────
  release:
    name: Create Release
    needs: [version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/release/

      - name: List release artifacts
        run: find dist/release -type f | sort | awk '{print "  " $0}'

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${{ needs.version.outputs.new_version }}"
          TAG="${{ needs.version.outputs.new_tag }}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^$TAG$" | head -1)

          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log "$PREV_TAG"..HEAD \
              --format="- %s (%h)" 2>/dev/null \
              | grep -v "chore(release):" || true)
          else
            COMMITS=$(git log --format="- %s (%h)" -20 \
              | grep -v "chore(release):" || true)
          fi

          cat > release_notes.md << EOF
          ## SecureAssess $TAG

          ### Downloads

          | Platform | Installer |
          |---|---|
          | macOS (Apple Silicon + Intel) | \`SecureAssess_${VERSION}_universal.dmg\` |
          | Linux x86_64 | \`SecureAssess_${VERSION}_amd64.AppImage\` |
          | Linux ARM64 | \`SecureAssess_${VERSION}_aarch64.AppImage\` |
          | Windows x64 | \`SecureAssess_${VERSION}_x64_en-US.msi\` |

          ### Installation

          **macOS:** Open the .dmg and drag SecureAssess to Applications.
          **Linux:** \`chmod +x SecureAssess*.AppImage && ./SecureAssess*.AppImage\`
          **Windows:** Run the .msi installer (or .exe from the nsis bundle).

          ### Changes

          $COMMITS

          ---
          Built from \`$(git rev-parse --short HEAD)\` · $(date -u +"%Y-%m-%d %H:%M UTC")
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:    ${{ needs.version.outputs.new_tag }}
          name:        "SecureAssess ${{ needs.version.outputs.new_tag }}"
          body_path:   release_notes.md
          draft:       false
          prerelease:  false
          make_latest: true
          files: |
            dist/release/**/*.dmg
            dist/release/**/*.AppImage
            dist/release/**/*.deb
            dist/release/**/*.msi
            dist/release/**/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Move latest tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f latest
          git push origin latest --force

  # ─── JOB 4: Deploy to Fly.io + Vercel ────────────────────────────
  deploy:
    name: Deploy
    needs: [version, release]    # only deploys after release is created
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: production      # uses GitHub Environment secrets

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      # ── Deploy FastAPI to Fly.io ───────────────────────────────────
      - name: Setup Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy API to Fly.io
        working-directory: apps/api
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl deploy \
            --remote-only \
            --strategy rolling \
            --wait-timeout 120

      # ── Deploy Next.js Admin to Vercel ────────────────────────────
      - name: Deploy Admin to Vercel
        env:
          VERCEL_TOKEN:   ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID:  ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm install -g vercel --quiet
          cd apps/admin
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          vercel build --prod --token=$VERCEL_TOKEN
          vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN

      - name: Post deployment summary
        run: |
          echo "## Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **API**: https://secureassess-api.fly.dev" >> $GITHUB_STEP_SUMMARY
          echo "- **Admin**: Vercel production URL" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ needs.version.outputs.new_tag }}" >> $GITHUB_STEP_SUMMARY
