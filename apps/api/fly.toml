# fly.toml app configuration file generated for secureassess-api on 2026-06-08T00:47:52+05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'secureassess-api'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile'

[env]
  ENVIRONMENT = 'production'
  LOG_LEVEL = 'INFO'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 50
    soft_limit = 30

[checks]
  [checks.health]
    port = 8080
    type = 'http'
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '256mb'
  cpus = 1
  memory_mb = 256
