################################
# Judge0 CE — local development config
################################

REDIS_URL=redis://redis:6379

POSTGRES_HOST=db
POSTGRES_PORT=5432
POSTGRES_DB=judge0
POSTGRES_USER=judge0
POSTGRES_PASSWORD=judge0secret

# Disable authentication for local dev (set a token in production)
AUTHN_HEADER=X-Auth-Token
AUTHN_TOKEN=

# Execution limits (generous for dev)
CPU_TIME_LIMIT=10
WALL_TIME_LIMIT=20
MEMORY_LIMIT=524288
MAX_FILE_SIZE=4096

# Allow running as root inside the sandbox (required on macOS Docker)
ENABLE_NETWORK=false
