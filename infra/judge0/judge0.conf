################################
# Judge0 CE — local development config
################################

# Redis
REDIS_URL=redis://redis:6379
REDIS_HOST=redis
REDIS_PORT=6379

# PostgreSQL
POSTGRES_HOST=db
POSTGRES_PORT=5432
POSTGRES_DB=judge0
POSTGRES_USER=judge0
POSTGRES_PASSWORD=judge0secret

# Auth (disabled locally)
AUTHN_HEADER=X-Auth-Token
AUTHN_TOKEN=

# Execution limits
CPU_TIME_LIMIT=10
WALL_TIME_LIMIT=20
MEMORY_LIMIT=524288
MAX_FILE_SIZE=4096

# Sandbox
ENABLE_NETWORK=false