version: "3"
agent:
  authtoken: $NGROK_AUTHTOKEN    # read from env, never hardcoded

tunnels:
  api:
    proto: http
    addr: 8000
    domain: $NGROK_STATIC_DOMAIN  # your static domain for the API
    inspect: true

  admin:
    proto: http
    addr: 3000
    inspect: true
    # No static domain for admin — URL changes per session, that is fine
    # Admin is opened in a browser, not hardcoded anywhere
