# cargo-deny configuration — see https://embarkstudios.github.io/cargo-deny/
# Run locally: cargo deny check

[advisories]
# unmaintained: "all" | "workspace" | "transitive" | "none"
unmaintained = "none"
# yanked: "deny" | "warn" | "allow"
yanked = "deny"

ignore = [
  # RUSTSEC-2024-0429 — glib VariantStrIter unsoundness
  #
  # Affected: glib >= 0.15.0, < 0.20.0  (our lock: 0.18.5)
  # Fixed in: glib 0.20.0
  #
  # Root cause: glib 0.18.5 is a LINUX-ONLY transitive dependency pulled in by
  #   wry → gtk / webkit2gtk (Tauri's Linux WebView backend).
  #   On macOS (our primary target), Tauri uses WKWebView via the system
  #   framework — glib/gtk/webkit2gtk are never compiled into the macOS binary.
  #
  # Why we cannot update today:
  #   webkit2gtk 2.0.2 (latest on crates.io) hard-requires glib 0.18.x.
  #   The entire gtk-rs ecosystem (gtk, gio, gdk, gdk-pixbuf, pango, soup3,
  #   webkit2gtk, javascriptcore-rs) must be updated together to 0.20.x.
  #   wry / tauri-runtime-wry have not yet released a version using gtk-rs 0.20.x.
  #
  # Tracking: watch for a wry release that bumps gtk to 0.20.x.
  { id = "RUSTSEC-2024-0429", reason = "Linux-only transitive dep via wry/webkit2gtk; blocked by upstream tauri/wry migration to gtk-rs 0.20.x" },

  # RUSTSEC-2023-0071 — rsa Marvin Attack (timing side-channel)
  #
  # Affected: rsa < 0.10 (our lock: 0.9.10)
  # No fixed version available for rsa 0.9.x.
  #
  # Root cause: pulled in transitively by sqlx-mysql → sqlx → tauri-plugin-sql.
  #   Our app uses SQLite only (tauri-plugin-sql with sqlite feature).
  #   sqlx-mysql is an optional sqlx sub-crate that gets compiled anyway.
  #
  # Mitigation: app does not use MySQL, does not call rsa for key operations.
  #   Watch for sqlx to update rsa or drop the MySQL crate dependency.
  { id = "RUSTSEC-2023-0071", reason = "Transitive via sqlx-mysql which sqlx pulls in despite sqlite-only usage; no fixed rsa 0.9.x available" },
]

[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-3-Clause",
  "ISC",
  "CC0-1.0",
  "MPL-2.0",
  "OpenSSL",      # ring 0.17.x
  "Unicode-3.0",  # unicode-ident 1.x, ICU4X crates
  "Zlib",         # miniz_oxide, adler, crc32fast
]

[bans]
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
