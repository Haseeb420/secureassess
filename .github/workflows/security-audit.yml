name: Security Audit

on:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  cargo-deny:
    name: cargo-deny (Rust advisories + bans + sources)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: apps/desktop/src-tauri/Cargo.toml
          command: check advisories bans sources
          # deny.toml at repo root is picked up automatically
          # licenses check excluded until allow-list is fully tuned

  python-safety:
    name: pip-audit (Python dependencies)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit Python dependencies
        run: pip-audit --requirement requirements.txt --strict

  npm-audit:
    name: npm audit (JavaScript dependencies)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # version is read from packageManager field in package.json (pnpm@9.15.0)

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Audit npm dependencies
        run: pnpm audit --audit-level=high
