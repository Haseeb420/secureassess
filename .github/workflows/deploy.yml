name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'apps/admin/**'
      - 'apps/api/**'
      - 'packages/**'      # shared packages affect admin; exclude from release.yml on purpose
  workflow_dispatch:
    inputs:
      target:
        description: 'What to deploy'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - api-only
          - admin-only

jobs:
  # ── Detect which paths changed (push only) ──────────────────────
  changes:
    name: Detect changed paths
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      admin: ${{ steps.filter.outputs.admin }}
      api:   ${{ steps.filter.outputs.api }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            admin:
              - 'apps/admin/**'
              - 'packages/**'
            api:
              - 'apps/api/**'

  # ── Deploy FastAPI to Fly.io ─────────────────────────────────────
  deploy-api:
    name: Deploy API to Fly.io
    needs: [changes]
    if: >-
      always() && !cancelled() && (
        (github.event_name == 'workflow_dispatch' && (inputs.target == 'all' || inputs.target == 'api-only')) ||
        (github.event_name == 'push' && needs.changes.result == 'success' && needs.changes.outputs.api == 'true')
      )
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        working-directory: apps/api
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only --wait-timeout 300

  # ── Deploy Next.js Admin to Vercel ───────────────────────────────
  deploy-admin:
    name: Deploy Admin to Vercel
    needs: [changes]
    if: >-
      always() && !cancelled() && (
        (github.event_name == 'workflow_dispatch' && (inputs.target == 'all' || inputs.target == 'admin-only')) ||
        (github.event_name == 'push' && needs.changes.result == 'success' && needs.changes.outputs.admin == 'true')
      )
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6
      - name: Deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          npm install -g vercel --quiet
          vercel --prod --archive=tgz --token=$VERCEL_TOKEN --yes
