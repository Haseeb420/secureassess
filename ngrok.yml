version: "3"
tunnels:
  # Static domain for the desktop app.
  # Routes to Next.js (port 3000) which proxies /api/backend/* to FastAPI (port 8000).
  # Desktop .env: VITE_API_BASE_URL=https://$NGROK_STATIC_DOMAIN/api/backend
  desktop:
    proto: http
    addr: 3000
    domain: $NGROK_STATIC_DOMAIN
    pooling_enabled: true
    inspect: true
